; MIIIME Launcher Sweeper Configuration
; จฯ 2026 MIIIME

; ภฬ ฦฤภฯภบ ANSI ภฮฤฺต๙ภธทฮ ภ๚ภๅตวพ๎พ฿ วีดฯดู.
; This file must be saved in ANSI encoding.

[Options]
; LogLevel: 0=Off, 1=All(no DEBUG), 2=DEBUG, 3=INFO+, 4=WARN+, 5=ERROR
LogLevel=0
; Local: พ๐พ๎ ผณมค / Language setting
; Kr = วัฑนพ๎ / Korean  ->  Loc\Kr.ini วสฟไ / Requires Loc\Kr.ini
; บ๑ฟ๖ตฮธ้ ฟตพ๎ ป็ฟ๋ / Leave empty to use English (default)
Local=

[Advanced]
; LogRotationSize: ทฮฑื ฦฤภฯ รึด๋ ลฉฑโ (นูภฬฦฎ). รสฐ๚ ฝร .log.oldทฮ ทฮลืภฬผว
; LogRotationSize: Maximum log file size in bytes. Rotates to .log.old when exceeded.
LogRotationSize=5242880
; พฦทก ฐชต้ภบ บ๑ฟ๖ตฮธ้ ฑโบปฐช ป็ฟ๋. ฦฤภฬวม(|)ทฮ บนผ๖ ม๖มค ฐกดษ.
; Leave the values below blank to use defaults. Multiple values can be separated by a pipe (|).
;LauncherSuffixes=_M
;BakkMarker=_bakk
;TempPrefix=MIIIME_
;LockFiles=Cleanup.lock|SysInject.lock
;StateFile=State.ini
